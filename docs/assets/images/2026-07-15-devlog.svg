  <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffd947"/><stop offset="1" stop-color="#f47a16"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".22"/></filter>
</defs>
