<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1024" viewBox="0 0 768 1024" role="img" aria-labelledby="title desc">
<title id="title">画像連携成功 — VR Avatar Viewer 開発日記</title>
<desc id="desc">狐耳と赤い眼鏡のろひが、ChatGPTとDevSpaceをつないでGitHub Pagesへ画像付き記事を公開するイラスト</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset=".58" stop-color="#0c2340"/><stop offset="1" stop-color="#143457"/></linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#14263e"/><stop offset="1" stop-color="#0b1729"/></linearGradient>
  <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffd84a"/><stop offset=".55" stop-color="#ff9c1b"/><stop offset="1" stop-color="#ed6812"/></linearGradient>
  <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffd72f"/><stop offset="1" stop-color="#f29b13"/></linearGradient>
  <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".35"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="768" height="1024" fill="url(#bg)"/>
<circle cx="654" cy="154" r="190" fill="#1c78a6" opacity=".14"/>
<circle cx="122" cy="806" r="230" fill="#ff9d24" opacity=".08"/>

<g font-family="system-ui, sans-serif">
  <text x="42" y="64" fill="#fff" font-size="31" font-weight="800">VR Avatar Viewer</text>
  <text x="42" y="101" fill="#4fd6ff" font-size="18" font-weight="700">DEVELOPMENT LOG — 2026.07.15</text>
  <rect x="42" y="125" width="684" height="2" fill="#3cbde7" opacity=".4"/>
  <text x="42" y="176" fill="#fff" font-size="38" font-weight="900">画像も、ちゃんとサイトへ。</text>
  <text x="43" y="210" fill="#bdd2e7" font-size="19">ChatGPT ⇄ DevSpace ⇄ GitHub Pages の連携が完成。</text>
</g>

<!-- flow panel -->
<g filter="url(#shadow)">
  <rect x="42" y="242" width="684" height="150" rx="24" fill="url(#panel)" stroke="#2d7295" stroke-width="2"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <rect x="72" y="277" width="150" height="78" rx="16" fill="#10283e" stroke="#4bd4ff"/>
    <text x="147" y="307" fill="#fff" font-size="19" font-weight="800">ChatGPT</text>
    <text x="147" y="334" fill="#78ddff" font-size="14">画像を生成</text>
    <rect x="309" y="277" width="150" height="78" rx="16" fill="#10283e" stroke="#ffb33f"/>
    <text x="384" y="307" fill="#fff" font-size="19" font-weight="800">DevSpace</text>
    <text x="384" y="334" fill="#ffd075" font-size="14">記事へ配置</text>
    <rect x="546" y="277" width="150" height="78" rx="16" fill="#10283e" stroke="#58e28c"/>
    <text x="621" y="307" fill="#fff" font-size="19" font-weight="800">GitHub Pages</text>
    <text x="621" y="334" fill="#82f0aa" font-size="14">サイト公開</text>
    <path d="M230 316h65" stroke="#4bd4ff" stroke-width="5" stroke-linecap="round"/>
    <path d="M287 306l14 10-14 10" fill="none" stroke="#4bd4ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M467 316h65" stroke="#58e28c" stroke-width="5" stroke-linecap="round"/>
    <path d="M524 306l14 10-14 10" fill="none" stroke="#58e28c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</g>

<!-- rohi -->
<g transform="translate(354 388)" filter="url(#shadow)">
  <!-- tail -->
  <path d="M258 327c120-20 127 128 29 139 68-57-2-95-55-65z" fill="url(#hair)" stroke="#6e300b" stroke-width="8"/>
  <path d="M305 411c30 4 45 20 50 38-19 20-42 26-69 17 22-13 29-31 19-55z" fill="#fff1ce" opacity=".9"/>
  <!-- ears -->
  <path d="M74 100L36 5l102 46z" fill="url(#hair)" stroke="#70310b" stroke-width="8"/>
  <path d="M302 100L340 5 238 51z" fill="url(#hair)" stroke="#70310b" stroke-width="8"/>
  <path d="M72 64L53 26l55 26z" fill="#ffe1ae"/>
  <path d="M304 64l19-38-55 26z" fill="#ffe1ae"/>
  <!-- head -->
  <ellipse cx="188" cy="181" rx="142" ry="148" fill="#ffd9c6" stroke="#70310b" stroke-width="8"/>
  <!-- hair -->
  <path d="M50 166C47 52 150 27 204 39c92 20 129 80 118 161-29-50-59-61-86-58-31-55-98-71-148-7-12 15-24 26-38 31z" fill="url(#hair)" stroke="#70310b" stroke-width="8"/>
  <path d="M140 48c61 3 83 28 91 55-37 19-61 49-72 93-5-59-17-103-19-148z" fill="url(#hair)"/>
  <!-- eyes -->
  <ellipse cx="126" cy="190" rx="28" ry="37" fill="#a81f1f"/>
  <ellipse cx="250" cy="190" rx="28" ry="37" fill="#a81f1f"/>
  <circle cx="136" cy="178" r="9" fill="#fff"/>
  <path d="M226 185q24 20 48 0" fill="none" stroke="#562018" stroke-width="7" stroke-linecap="round"/>
  <!-- glasses -->
  <g fill="none" stroke="#b5252d" stroke-width="7">
    <rect x="83" y="151" width="86" height="66" rx="17" transform="rotate(-6 126 184)"/>
    <rect x="207" y="151" width="86" height="66" rx="17" transform="rotate(6 250 184)"/>
    <path d="M169 178h38"/>
  </g>
  <!-- mouth -->
  <path d="M157 248q31 33 64 0" fill="#9f2722" stroke="#6b241b" stroke-width="5"/>
  <path d="M173 263q16 10 33 0" stroke="#ff9b9b" stroke-width="6" stroke-linecap="round"/>
  <!-- body -->
  <path d="M76 323q112-84 224 0l36 255H41z" fill="url(#shirt)" stroke="#70310b" stroke-width="8"/>
  <path d="M77 316l121 262" stroke="#25252a" stroke-width="30"/>
  <rect x="123" y="389" width="140" height="90" rx="14" fill="#111c2c" stroke="#4bd4ff" stroke-width="4"/>
  <text x="193" y="426" text-anchor="middle" font-family="system-ui, sans-serif" fill="#fff" font-size="17" font-weight="800">IMAGE</text>
  <text x="193" y="451" text-anchor="middle" font-family="system-ui, sans-serif" fill="#58e28c" font-size="15">DISPLAY OK ✓</text>
  <!-- thumb up -->
  <path d="M293 330c34-19 55-17 68 2 14 22-4 43-26 42 14 12 10 37-9 45-17 7-33-2-42-17l-32-49z" fill="#ffd9c6" stroke="#70310b" stroke-width="8"/>
  <path d="M332 337c22-59 52-48 48-16-3 19-13 35-28 48" fill="#ffd9c6" stroke="#70310b" stroke-width="8" stroke-linecap="round"/>
</g>

<!-- bottom cards -->
<g font-family="system-ui, sans-serif" filter="url(#shadow)">
  <rect x="42" y="855" width="330" height="127" rx="22" fill="url(#panel)" stroke="#2d7295"/>
  <text x="64" y="890" fill="#4fd6ff" font-size="20" font-weight="800">今日の修正</text>
  <text x="64" y="923" fill="#e7f3ff" font-size="16">✓ 壊れたプレースホルダーを撤去</text>
  <text x="64" y="951" fill="#e7f3ff" font-size="16">✓ 実画像として確実に表示</text>

  <rect x="396" y="855" width="330" height="127" rx="22" fill="url(#panel)" stroke="#a86a25"/>
  <text x="418" y="890" fill="#ffc45f" font-size="20" font-weight="800">ろひのひとこと</text>
  <text x="418" y="923" fill="#fff" font-size="17" font-weight="700">「これで毎日の絵も、</text>
  <text x="418" y="950" fill="#fff" font-size="17" font-weight="700">ちゃんとサイトに載るね！」</text>
</g>

<g filter="url(#glow)">
  <circle cx="687" cy="174" r="5" fill="#ffe36b"/>
  <path d="M687 153v42M666 174h42" stroke="#ffe36b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="318" cy="437" r="4" fill="#4fd6ff"/>
  <path d="M318 420v34M301 437h34" stroke="#4fd6ff" stroke-width="3" stroke-linecap="round"/>
</g>
</svg>
